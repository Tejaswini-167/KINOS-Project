<!DOCTYPE html>
<html lang="en" ng-app="kinosApp">
<head>
  <meta charset="UTF-8">
  <title>Book Consultation</title>

  <link rel="stylesheet" href="../CSS/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>

  <script src="../JavaScript/jquery-script.js"></script>
  <script src="../JavaScript/app.js"></script>
</head>

<body ng-controller="MainController">

<div class="container mt-5">
  <h2>Book Consultation</h2>

  <form ng-submit="addBooking()">

    <input class="form-control mb-2" ng-model="newBooking.name" placeholder="Name" required>
    <input class="form-control mb-2" ng-model="newBooking.phone" placeholder="Phone" required>

    <select class="form-control mb-2" ng-model="newBooking.painArea">
      <option>Back Pain</option>
      <option>Neck Pain</option>
      <option>Knee Pain</option>
    </select>

    <button class="btn btn-primary w-100">Submit</button>

  </form>
</div>

</body>
</html>
